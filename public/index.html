<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code Connector - 测试界面</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .header {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .header h1 {
      color: #333;
      font-size: 24px;
      margin-bottom: 8px;
    }

    .header p {
      color: #666;
      font-size: 14px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      margin-top: 12px;
    }

    .status.connected {
      background: #d4edda;
      color: #155724;
    }

    .status.disconnected {
      background: #f8d7da;
      color: #721c24;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .config-panel {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .config-panel h2 {
      color: #333;
      font-size: 18px;
      margin-bottom: 16px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      color: #555;
      font-size: 14px;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 60px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
    }

    .btn-primary:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    .btn-secondary:hover {
      background: #5a6268;
    }

    .btn-danger {
      background: #dc3545;
      color: white;
    }

    .btn-danger:hover {
      background: #c82333;
    }

    .chat-container {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .chat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .chat-header h2 {
      color: #333;
      font-size: 18px;
    }

    .chat-actions {
      display: flex;
      gap: 8px;
    }

    .messages {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 16px;
      min-height: 300px;
      max-height: 500px;
      overflow-y: auto;
      margin-bottom: 16px;
    }

    .message {
      margin-bottom: 16px;
      padding: 12px;
      border-radius: 8px;
      max-width: 80%;
    }

    .message.user {
      background: #667eea;
      color: white;
      margin-left: auto;
    }

    .message.assistant {
      background: white;
      color: #333;
      border: 1px solid #e0e0e0;
    }

    .message.system {
      background: #fff3cd;
      color: #856404;
      font-size: 12px;
      text-align: center;
      max-width: 100%;
    }

    .message-sender {
      font-weight: 600;
      font-size: 12px;
      margin-bottom: 4px;
      opacity: 0.8;
    }

    .message-content {
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .input-area {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .input-area textarea {
      flex: 1;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 50px;
      max-height: 150px;
    }

    .input-area textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .empty-state {
      text-align: center;
      color: #999;
      padding: 40px;
    }

    .empty-state svg {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <div class="header">
      <h1>🤖 Claude Code Connector</h1>
      <p>测试 Claude Code CLI 对话功能</p>
      <div id="status" class="status disconnected">
        <span class="status-dot"></span>
        <span id="statusText">未连接</span>
      </div>
    </div>

    <!-- 配置面板 -->
    <div class="config-panel" id="configPanel">
      <h2>⚙️ 连接配置</h2>
      <form id="connectForm">
        <div class="form-row">
          <div class="form-group">
            <label for="claudeCmdPath">Claude CMD 路径</label>
            <input type="text" id="claudeCmdPath" name="claudeCmdPath"
                   placeholder="C:\Users\...\npm\claude.cmd" required>
          </div>
          <div class="form-group">
            <label for="workDir">工作目录</label>
            <input type="text" id="workDir" name="workDir"
                   placeholder="D:\MyProject" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="gitBinPath">Git Bash 路径（可选）</label>
            <input type="text" id="gitBinPath" name="gitBinPath"
                   placeholder="C:\Program Files\Git\bin\bash.exe">
          </div>
          <div class="form-group">
            <label for="systemPrompt">系统提示词（可选）</label>
            <textarea id="systemPrompt" name="systemPrompt"
                      placeholder="You are a helpful assistant..."></textarea>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="connectBtn">
          连接到 Claude Code
        </button>
      </form>
    </div>

    <!-- 聊天界面 -->
    <div class="chat-container" id="chatContainer">
      <div class="chat-header">
        <h2>💬 对话</h2>
        <div class="chat-actions">
          <button class="btn btn-secondary" id="resetBtn">重置会话</button>
        </div>
      </div>

      <div class="messages" id="messages">
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
          </svg>
          <p>请先连接到 Claude Code，然后开始对话</p>
        </div>
      </div>

      <div class="input-area">
        <textarea id="messageInput" placeholder="输入消息..." disabled></textarea>
        <button class="btn btn-primary" id="sendBtn" disabled>
          发送
        </button>
      </div>
    </div>
  </div>

  <script>
    // 状态管理
    let isConnected = false;
    let currentSessionId = null;
    let isLoading = false;

    // DOM 元素
    const statusEl = document.getElementById('status');
    const statusTextEl = document.getElementById('statusText');
    const connectForm = document.getElementById('connectForm');
    const connectBtn = document.getElementById('connectBtn');
    const messagesEl = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const resetBtn = document.getElementById('resetBtn');

    // 从配置文件加载默认值
    async function loadDefaults() {
      try {
        const response = await fetch('/api/status');
        const data = await response.json();

        // 设置默认值（从之前的配置）
        document.getElementById('claudeCmdPath').value =
          'C:\\Users\\28409\\AppData\\Roaming\\npm\\claude.cmd';
        document.getElementById('workDir').value = 'D:\\oprcli';
        document.getElementById('gitBinPath').value =
          'C:\\Program Files\\Git\\bin\\bash.exe';
      } catch (error) {
        console.error('加载默认配置失败:', error);
      }
    }

    // 更新连接状态
    function updateStatus(connected) {
      isConnected = connected;
      statusEl.className = connected ? 'status connected' : 'status disconnected';
      statusTextEl.textContent = connected ? '已连接' : '未连接';
      messageInput.disabled = !connected;
      sendBtn.disabled = !connected;
    }

    // 添加消息
    function addMessage(type, content) {
      // 移除空状态
      const emptyState = messagesEl.querySelector('.empty-state');
      if (emptyState) {
        emptyState.remove();
      }

      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${type}`;

      const senderDiv = document.createElement('div');
      senderDiv.className = 'message-sender';
      senderDiv.textContent =
        type === 'user' ? '你' :
        type === 'assistant' ? 'Claude' : '系统';

      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';
      contentDiv.textContent = content;

      messageDiv.appendChild(senderDiv);
      messageDiv.appendChild(contentDiv);
      messagesEl.appendChild(messageDiv);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // 连接到 Claude Code
    connectForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      connectBtn.disabled = true;
      connectBtn.textContent = '连接中...';

      const formData = new FormData(connectForm);
      const data = Object.fromEntries(formData);

      try {
        const response = await fetch('/api/connect', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if (result.success) {
          updateStatus(true);
          addMessage('system', `已连接到 Claude Code ${result.version}`);
        } else {
          alert('连接失败: ' + result.error);
        }
      } catch (error) {
        alert('连接失败: ' + error.message);
      } finally {
        connectBtn.disabled = false;
        connectBtn.textContent = '连接到 Claude Code';
      }
    });

    // 发送消息
    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message || isLoading) return;

      isLoading = true;
      sendBtn.disabled = true;
      sendBtn.innerHTML = '<span class="loading"></span>';

      // 显示用户消息
      addMessage('user', message);
      messageInput.value = '';

      try {
        const response = await fetch('/api/message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message,
            sessionId: currentSessionId || undefined,  // ✅ 发送会话 ID
            systemPrompt: document.getElementById('systemPrompt').value || null
          })
        });

        const result = await response.json();

        if (result.success) {
          currentSessionId = result.sessionId;

          console.log('收到事件数量:', result.events.length);
          console.log('所有事件:', result.events);

          // 从 assistant 事件中提取文本内容
          let fullText = '';

          for (const event of result.events) {
            // 处理 assistant 类型事件
            if (event.type === 'assistant' && event.message?.content) {
              for (const content of event.message.content) {
                // 提取 text 类型内容
                if (content.type === 'text' && content.text) {
                  fullText += content.text;
                }
                // 忽略 thinking 类型内容
                else if (content.type === 'thinking') {
                  // 不显示思考过程
                }
              }
            }
            // 处理 result 类型事件（可能包含结果文本）
            else if (event.type === 'result' && event.result) {
              // 如果还没有文本，使用 result
              if (!fullText && event.result) {
                fullText = event.result;
              }
            }
          }

          console.log('提取的文本长度:', fullText.length);
          console.log('提取的文本:', fullText);

          if (fullText.trim()) {
            addMessage('assistant', fullText);
          } else {
            // 没有提取到文本
            const eventTypes = result.events.map(e => e.type).join(', ');
            if (result.events.length > 0) {
              addMessage('system', `收到 ${result.events.length} 个事件（类型: ${eventTypes}），但无法提取文本内容`);
              console.log('事件详情:', result.events);
            } else {
              addMessage('system', '消息已发送，但没有收到任何事件响应');
            }
          }
        } else {
          addMessage('system', '错误: ' + result.error);
        }
      } catch (error) {
        addMessage('system', '错误: ' + error.message);
      } finally {
        isLoading = false;
        sendBtn.disabled = false;
        sendBtn.textContent = '发送';
        messageInput.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // 重置会话
    resetBtn.addEventListener('click', async () => {
      if (!confirm('确定要重置会话吗？')) return;

      try {
        await fetch('/api/reset', { method: 'POST' });
        currentSessionId = null;
        messagesEl.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
            </svg>
            <p>会话已重置，开始新的对话吧</p>
          </div>
        `;
      } catch (error) {
        alert('重置失败: ' + error.message);
      }
    });

    // 初始化
    loadDefaults();
  </script>
</body>
</html>
